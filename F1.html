<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>A-Frame VR 教室 · 全物品展示（缩小版）</title>
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    .info { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.8); font-family: sans-serif; font-size: 14px; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,0.5); z-index: 10; }
    .controls-hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-family: sans-serif; font-size: 13px; background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px; pointer-events: none; z-index: 10; backdrop-filter: blur(4px); }
  </style>
</head>
<body>
  <a-scene
    background="color: #87ceeb"
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    device-orientation-permission-ui="enabled: true"
    gridHelper="enabled: false"
  >

    <!-- 天空盒子 -->
    <a-sky src="./F1/f1.png" rotation="0 -30 0"></a-sky>

    <!-- ASSETS -->
    <a-assets>
      <a-asset-item id="snowGround" src="./model/雪地.glb"></a-asset-item>
      <a-asset-item id="unpackModel" src="./model/拆封.glb"></a-asset-item>
      <a-asset-item id="alienPlant" src="./model/外星植物.glb"></a-asset-item>
      <a-asset-item id="figTree" src="./model/无花果树.glb"></a-asset-item>
      <a-asset-item id="angelEye" src="./model/天使之眼.glb"></a-asset-item>
      <a-asset-item id="crystal" src="./model/紫晶石.glb"></a-asset-item>
      <!-- 新增物品 -->
      <a-asset-item id="silverDistiller" src="./model/银蒸馏器.glb"></a-asset-item>
      <a-asset-item id="bloodyGoblet" src="./model/血腥酒杯.glb"></a-asset-item>
      <a-asset-item id="egyptClay" src="./model/埃及土块.glb"></a-asset-item>
      <a-asset-item id="box" src="./model/匣子.glb"></a-asset-item>
      <a-asset-item id="mirror" src="./model/镜子.glb"></a-asset-item>
      <a-asset-item id="tornBook" src="./model/破烂书.glb"></a-asset-item>
      <a-asset-item id="alienChalice" src="./model/异形圣杯.glb"></a-asset-item>
      <a-asset-item id="copperBrooch" src="./model/铜胸针.glb"></a-asset-item>
      <a-asset-item id="grapeEarring" src="./model/葡萄耳环.glb"></a-asset-item>
      <a-asset-item id="censer" src="./model/香炉.glb"></a-asset-item>
      <a-asset-item id="copperBowl" src="./model/铜碗.glb"></a-asset-item>
      <a-asset-item id="turquoiseLion" src="./model/绿松石狮子.glb"></a-asset-item>
      <a-asset-item id="oneEaredAlpaca" src="./model/独耳金羊驼.glb"></a-asset-item>
      <a-asset-item id="goldCandlestick" src="./model/金烛台.glb"></a-asset-item>
      <a-asset-item id="alienLiddedCup" src="./model/异形盖杯.glb"></a-asset-item>
    </a-assets>

    <!-- 雪地地面 -->
    <a-entity 
      gltf-model="#snowGround" 
      position="0 -4 0" 
      rotation="0 0 0" 
      scale="1 1 1"
      shadow
    ></a-entity>

    <!-- ★★★ 紫晶石 - 摆满地面 ★★★ -->
    <a-entity gltf-model="#crystal" position="-2 -3.5 2" rotation="0 0 0" scale="0.8 0.8 0.8" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="3 -3.5 -1" rotation="0 0 0" scale="1 1 1" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="-1 -3.5 -3" rotation="0 0 0" scale="0.9 0.9 0.9" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="4 -3.5 3" rotation="0 0 0" scale="1.1 1.1 1.1" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="-4 -3.5 -2" rotation="0 0 0" scale="0.7 0.7 0.7" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="5 -3.5 -4" rotation="0 0 0" scale="0.9 0.9 0.9" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="-5 -3.5 4" rotation="0 0 0" scale="1.2 1.2 1.2" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="0 -3.5 5" rotation="0 0 0" scale="0.8 0.8 0.8" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="6 -3.5 1" rotation="0 0 0" scale="1 1 1" shadow></a-entity>
    <a-entity gltf-model="#crystal" position="-6 -3.5 -1" rotation="0 0 0" scale="1.1 1.1 1.1" shadow></a-entity>

    <!-- ★★★ 所有浮动物品 - 缩小版，上下浮动 ★★★ -->
    
    <!-- 银蒸馏器 -->
    <a-entity gltf-model="#silverDistiller" position="-8 3 2" rotation="0 0 0" scale="0.05 0.05 0.05" shadow>
      <a-animation attribute="position" to="-8 4 2" dur="2000" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 血腥酒杯 -->
    <a-entity gltf-model="#bloodyGoblet" position="4 -1 -27" rotation="0 0 0" scale="2 2 2" shadow>
      <a-animation attribute="position" to="7 3.5 -3" dur="1800" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 埃及土块 -->
    <a-entity gltf-model="#egyptClay" position="-4 2.8 7" rotation="0 0 0" scale="0.5 0.5 0.5" shadow>
      <a-animation attribute="position" to="-4 3.8 7" dur="2200" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 匣子 -->
    <a-entity gltf-model="#box" position="5 3.2 6" rotation="0 0 0" scale="14 14 14" shadow>
      <a-animation attribute="position" to="5 4.2 6" dur="1900" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 镜子 -->
    <a-entity gltf-model="#mirror" position="-4 2.6 -15" rotation="0 0 0" scale="4 4 4" shadow>
      <a-animation attribute="position" to="-6 3.6 -5" dur="2100" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 破烂书 -->
    <a-entity gltf-model="#tornBook" position="6 2.9 -60" rotation="0 0 0" scale="0.1 0.1 0.1" shadow>
      <a-animation attribute="position" to="6 3.9 -6" dur="1700" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 异形圣杯 -->
    <a-entity gltf-model="#alienChalice" position="9 3.4 17" rotation="0 0 0" scale="0.01 0.01 0.01" shadow>
      <a-animation attribute="position" to="-9 4.4 -2" dur="2300" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 铜胸针 -->
    <a-entity gltf-model="#copperBrooch" position="9 2.7 2" rotation="0 0 0" scale="0.1 0.1 0.1" shadow>
      <a-animation attribute="position" to="9 3.7 2" dur="2000" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 葡萄耳环 -->
    <a-entity gltf-model="#grapeEarring" position="-3 3.1 8" rotation="0 0 0" scale="0.1 0.1 0.1" shadow>
      <a-animation attribute="position" to="-3 4.1 -8" dur="1850" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 香炉 -->
    <a-entity gltf-model="#censer" position="3 2.4 8" rotation="0 0 0" scale="1 1 1" shadow>
      <a-animation attribute="position" to="3 3.4 8" dur="2150" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 铜碗 -->
    <a-entity gltf-model="#copperBowl" position="-7 3.6 47" rotation="0 0 0" scale="1 1 1" shadow>
      <a-animation attribute="position" to="-7 4.6 5" dur="1950" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 绿松石狮子 -->
    <a-entity gltf-model="#turquoiseLion" position="8 2.8 -2" rotation="0 0 0" scale="17 17 17" shadow>
      <a-animation attribute="position" to="8 3.8 -4" dur="2050" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 独耳金羊驼 -->
    <a-entity gltf-model="#oneEaredAlpaca" position="-5 3.3 -7" rotation="0 0 0" scale="0.5 0.5 0.5" shadow>
      <a-animation attribute="position" to="-5 4.3 -7" dur="2250" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 金烛台 -->
    <a-entity gltf-model="#goldCandlestick" position="4 2.5 -8" rotation="0 0 0" scale="11 11 11" shadow>
      <a-animation attribute="position" to="4 3.5 -8" dur="1750" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>
    
    <!-- 异形盖杯 -->
    <a-entity gltf-model="#alienLiddedCup" position="-2 3.7 11" rotation="0 0 0" scale="0.1 0.1 0.1" shadow>
      <a-animation attribute="position" to="-2 4.7 9" dur="2400" direction="alternate" repeat="indefinite" easing="ease-in-out"></a-animation>
    </a-entity>

    <!-- ★★★ 拆封模型 ★★★ -->
    <a-entity 
      gltf-model="#unpackModel" 
      position="0 4 0" 
      rotation="0 0 0" 
      scale="7 7 7"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
      shadow
    ></a-entity>

    <!-- ★★★ 天使之眼 ★★★ -->
    <a-entity 
      gltf-model="#angelEye" 
      position="-10 70 3" 
      rotation="0 0 0" 
      scale="3 3 3"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
      shadow
    ></a-entity>

    <!-- ★★★ 外星植物丛林 ★★★ -->
    <a-entity gltf-model="#alienPlant" position="-18 14 10" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-22 14 -8" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 18000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="20 14 -12" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 14000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="24 14 8" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-10 14 -20" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="12 14 -22" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 22000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-15 14 -15" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 17000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="18 14 -18" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 19000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-35 14 18" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-40 14 -12" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 28000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-30 14 -28" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 23000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="38 14 20" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 32000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="42 14 -15" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 29000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="32 14 -32" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 35000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-45 14 5" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 26000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="45 14 -5" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 31000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-38 14 -25" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 27000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="35 14 -28" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-55 14 25" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 40000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-58 14 -20" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 45000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-50 14 -40" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 38000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="55 14 30" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 42000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="60 14 -18" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 48000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="50 14 -42" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 39000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="-65 14 0" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 36000; easing: linear" shadow></a-entity>
    <a-entity gltf-model="#alienPlant" position="65 14 0" rotation="0 0 0" scale="17 17 17" animation="property: rotation; to: 0 360 0; loop: true; dur: 44000; easing: linear" shadow></a-entity>

    <!-- ★★★ 无花果树 ★★★ -->
    <a-entity gltf-model="#figTree" position="-80 -4 50" rotation="0 0 0" scale="170 170 170" material="metalness: 0.8; roughness: 0.3; color: #ff6b6b" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="-90 -4 -30" rotation="0 0 0" scale="170 170 170" material="metalness: 0.7; roughness: 0.4; color: #ffd93d" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="-75 -4 -70" rotation="0 0 0" scale="170 170 170" material="metalness: 0.9; roughness: 0.2; color: #6bcb77" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="85 -4 60" rotation="0 0 0" scale="170 170 170" material="metalness: 0.6; roughness: 0.5; color: #4d96ff" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="95 -4 -40" rotation="0 0 0" scale="170 170 170" material="metalness: 0.8; roughness: 0.3; color: #9b59b6" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="80 -4 -80" rotation="0 0 0" scale="170 170 170" material="metalness: 0.7; roughness: 0.4; color: #1abc9c" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="-100 -4 10" rotation="0 0 0" scale="170 170 170" material="metalness: 0.9; roughness: 0.2; color: #e67e22" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="100 -4 -10" rotation="0 0 0" scale="170 170 170" material="metalness: 0.6; roughness: 0.5; color: #e74c3c" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="-10 -4 -100" rotation="0 0 0" scale="170 170 170" material="metalness: 0.8; roughness: 0.3; color: #2ecc71" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="20 -4 100" rotation="0 0 0" scale="170 170 170" material="metalness: 0.7; roughness: 0.4; color: #3498db" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="-110 -4 -60" rotation="0 0 0" scale="170 170 170" material="metalness: 0.9; roughness: 0.2; color: #f1c40f" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="110 -4 50" rotation="0 0 0" scale="170 170 170" material="metalness: 0.6; roughness: 0.5; color: #e84393" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="-95 -4 80" rotation="0 0 0" scale="170 170 170" material="metalness: 0.8; roughness: 0.3; color: #00b894" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="90 -4 -85" rotation="0 0 0" scale="170 170 170" material="metalness: 0.7; roughness: 0.4; color: #6c5ce7" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="-60 -4 -95" rotation="0 0 0" scale="170 170 170" material="metalness: 0.9; roughness: 0.2; color: #fd79a8" shadow></a-entity>
    <a-entity gltf-model="#figTree" position="70 -4 90" rotation="0 0 0" scale="170 170 170" material="metalness: 0.6; roughness: 0.5; color: #fdcb6e" shadow></a-entity>

    <!-- LIGHTS -->
    <a-ambient-light intensity="1.2" color="#ffb6c1"></a-ambient-light>
    <a-light type="hemisphere" intensity="1.0" color="#ff85a2" ground-color="#ff69b4"></a-light>
    <a-directional-light position="0 10 20" intensity="1.8" color="#ff8da1"></a-directional-light>
    <a-directional-light position="0 10 -20" intensity="1.8" color="#ff8da1"></a-directional-light>
    <a-directional-light position="-20 10 0" intensity="1.8" color="#ff9eb5"></a-directional-light>
    <a-directional-light position="20 10 0" intensity="1.8" color="#ff9eb5"></a-directional-light>
    <a-directional-light position="0 25 0" intensity="1.5" color="#ffc0cb"></a-directional-light>
    <a-directional-light position="0 -10 0" intensity="1.0" color="#ff69b4"></a-directional-light>
    <a-directional-light position="-15 8 15" intensity="1.2" color="#ffaab8"></a-directional-light>
    <a-directional-light position="15 8 -15" intensity="1.2" color="#ffaab8"></a-directional-light>
    <a-directional-light position="-15 8 -15" intensity="1.2" color="#ffaab8"></a-directional-light>
    <a-directional-light position="15 8 15" intensity="1.2" color="#ffaab8"></a-directional-light>
    <a-light type="point" position="0 -2 0" intensity="0.8" color="#ff69b4" distance="30" decay="0.2"></a-light>
    <a-light type="point" position="-12 -3 12" intensity="0.6" color="#ff8da1" distance="25" decay="0.2"></a-light>
    <a-light type="point" position="12 -3 12" intensity="0.6" color="#ff8da1" distance="25" decay="0.2"></a-light>
    <a-light type="point" position="-12 -3 -12" intensity="0.6" color="#ff8da1" distance="25" decay="0.2"></a-light>
    <a-light type="point" position="12 -3 -12" intensity="0.6" color="#ff8da1" distance="25" decay="0.2"></a-light>

    <!-- CAMERA -->
    <a-entity id="rig" position="0 1.6 8">
      <a-camera look-controls wasd-controls="acceleration: 30; fly: false; speed: 15">
        <a-cursor
          fuse="true"
          fuse-timeout="2000"
          geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
          material="color: white; shader: flat">
        </a-cursor>
      </a-camera>
    </a-entity>

    <!-- 传送标记 -->
    <a-cylinder position="0 0.05 15" radius="2" height="0.05" material="color: #ff69b4; opacity: 0.4; transparent: true; emissive: #ff1493" smooth-teleport="target: 0 1.6 15"></a-cylinder>
    <a-cylinder position="0 0.05 30" radius="2" height="0.05" material="color: #ff69b4; opacity: 0.4; transparent: true; emissive: #ff1493" smooth-teleport="target: 0 1.6 30"></a-cylinder>
    <a-cylinder position="0 0.05 -5" radius="2" height="0.05" material="color: #ff69b4; opacity: 0.4; transparent: true; emissive: #ff1493" smooth-teleport="target: 0 1.6 -5"></a-cylinder>
    <a-cylinder position="0 0.05 -15" radius="2" height="0.05" material="color: #ff69b4; opacity: 0.4; transparent: true; emissive: #ff1493" smooth-teleport="target: 0 1.6 -15"></a-cylinder>
    <a-cylinder position="-15 0.05 0" radius="2" height="0.05" material="color: #ff69b4; opacity: 0.4; transparent: true; emissive: #ff1493" smooth-teleport="target: -15 1.6 0"></a-cylinder>
    <a-cylinder position="15 0.05 0" radius="2" height="0.05" material="color: #ff69b4; opacity: 0.4; transparent: true; emissive: #ff1493" smooth-teleport="target: 15 1.6 0"></a-cylinder>

  </a-scene>

  <div class="controls-hint">🟣 WASD移动 · 凝视传送 · 速度15</div>
  <div class="info">💎 15件悬浮物品 · 缩小版 · 上下浮动 · 无自转</div>
  <script src="script.js"></script>
</body>
</html>
