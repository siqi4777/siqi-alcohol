<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>A-Frame VR · 传送阵列 + 物品信息 + 音效</title>
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  
  <script>
    // 自定义凝视信息组件 - 修复凝视交互
    AFRAME.registerComponent('gaze-info', {
      schema: {
        title: { type: 'string', default: '神秘物品' },
        desc: { type: 'string', default: '' }
      },
      init: function () {
        let el = this.el;
        let data = this.data;
        let infoPanel = document.getElementById('info-panel');
        let soundSystem = document.getElementById('sound-system');

        // 鼠标/凝视进入
        el.addEventListener('mouseenter', function () {
          if (infoPanel) {
            let descHtml = data.desc ? `<span class='sub'>${data.desc}</span>` : '';
            infoPanel.innerHTML = `<b>${data.title}</b>${descHtml}`;
            infoPanel.classList.add('visible');
          }
          // 播放信息提示音
          if (soundSystem) {
            let infoSound = soundSystem.querySelector('#info-sound');
            if (infoSound) {
              infoSound.components.sound.playSound();
            }
          }
        });

        // 鼠标/凝视离开
        el.addEventListener('mouseleave', function () {
          if (infoPanel) {
            infoPanel.classList.remove('visible');
            // 延迟清空内容，避免闪烁
            setTimeout(() => {
              if (!infoPanel.classList.contains('visible')) {
                infoPanel.innerHTML = '';
              }
            }, 100);
          }
        });
      }
    });
  </script>

  <style>
    body { margin: 0; overflow: hidden; }
    .info { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.8); font-family: sans-serif; font-size: 14px; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,0.5); z-index: 10; }
    .controls-hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-family: sans-serif; font-size: 13px; background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px; pointer-events: none; z-index: 10; backdrop-filter: blur(4px); }
    #info-panel { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: #fff; padding: 16px 30px; border-radius: 12px; font-family: 'Segoe UI', sans-serif; font-size: 18px; pointer-events: none; z-index: 20; backdrop-filter: blur(8px); border: 1px solid rgba(255,105,180,0.4); opacity: 0; transition: opacity 0.5s; max-width: 500px; text-align: center; }
    #info-panel.visible { opacity: 1; }
    #info-panel .sub { font-size: 13px; color: #ffb6c1; margin-top: 4px; display: block; }
  </style>
</head>
