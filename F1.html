<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>VR · 物品哲思 · 完整场景</title>
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
    body { margin: 0; overflow: hidden; font-family: 'Playfair Display', serif; }
    * { font-family: 'Playfair Display', serif; }
    #skip-btn {
  position: absolute;
  bottom: 30px;
  left: 30px;
  z-index: 50;
  background: rgba(200, 180, 140, 0.15);
  border: 1px solid rgba(200, 180, 140, 0.3);
  color: rgba(255, 255, 255, 0.6);
  padding: 10px 24px;
  border-radius: 30px;
  font-family: 'Playfair Display', serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
  letter-spacing: 1px;
}
#skip-btn:hover {
  background: rgba(200, 180, 140, 0.3);
  border-color: #c9b88a;
  color: #f0e8d0;
  transform: scale(1.05);
}
    .info { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.8); font-family: 'Playfair Display', serif; font-size: 14px; pointer-events: none; text-shadow: 0 1px 4px rgba(0,0,0,0.5); z-index: 10; }
    .controls-hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-family: 'Playfair Display', serif; font-size: 13px; background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px; pointer-events: none; z-index: 10; backdrop-filter: blur(4px); }
    
    #info-panel { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(10,5,20,0.85); color: #f0e8d0; padding: 24px 40px; border-radius: 16px; font-family: 'Playfair Display', serif; font-size: 20px; pointer-events: none; z-index: 20; backdrop-filter: blur(12px); border: 1px solid rgba(200,180,140,0.3); opacity: 0; transition: opacity 0.6s ease; max-width: 600px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.6); letter-spacing: 0.5px; line-height: 1.6; }
    #info-panel.visible { opacity: 1; pointer-events: auto; }
    #info-panel .title { font-size: 14px; color: #c9b88a; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; display: block; font-weight: 400; }
    #info-panel .main-text { font-size: 22px; font-weight: 400; font-style: italic; color: #f5efe0; margin-bottom: 12px; display: block; }
    #info-panel .sub-text { font-size: 15px; color: #c9b88a; margin-top: 4px; display: block; font-weight: 400; }
    #info-panel .options { display: flex; gap: 20px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    #info-panel .options button { background: rgba(200,180,140,0.15); border: 1px solid rgba(200,180,140,0.4); color: #f0e8d0; padding: 10px 28px; border-radius: 30px; font-family: 'Playfair Display', serif; font-size: 15px; cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.5px; backdrop-filter: blur(4px); }
    #info-panel .options button:hover { background: rgba(200,180,140,0.3); border-color: #c9b88a; transform: scale(1.05); box-shadow: 0 0 20px rgba(200,180,140,0.15); }
    #info-panel .options button:active { transform: scale(0.95); }
    #info-panel .options button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #info-panel .feedback { font-size: 16px; color: #e8d5b0; margin-top: 12px; display: block; font-style: italic; }
    
    #alcohol-meter { position: absolute; top: 20px; left: 20px; z-index: 30; font-family: 'Playfair Display', serif; color: #f0e8d0; background: rgba(10,5,20,0.7); padding: 12px 20px; border-radius: 12px; backdrop-filter: blur(8px); border: 1px solid rgba(200,180,140,0.2); min-width: 160px; pointer-events: none; }
    #alcohol-meter .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #c9b88a; margin-bottom: 4px; display: block; }
    #alcohol-meter .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-top: 4px; }
    #alcohol-meter .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #c9b88a, #f0d8a0, #ffd700); border-radius: 4px; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
    #alcohol-meter .value { font-size: 13px; margin-top: 4px; display: block; text-align: right; color: #c9b88a; }
    
    #item-name { position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-family: 'Playfair Display', serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; z-index: 15; opacity: 0; transition: opacity 0.8s ease; text-shadow: 0 2px 12px rgba(0,0,0,0.5); }
    #item-name.visible { opacity: 1; }
    
    #completion { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #f0e8d0; font-family: 'Playfair Display', serif; font-size: 28px; text-align: center; z-index: 40; opacity: 0; pointer-events: none; transition: opacity 2s ease; background: rgba(10,5,20,0.8); padding: 40px 60px; border-radius: 20px; border: 1px solid rgba(200,180,140,0.3); backdrop-filter: blur(16px); max-width: 500px; line-height: 1.6; }
    #completion.visible { opacity: 1; pointer-events: auto; }
    #completion .sub { font-size: 16px; color: #c9b88a; margin-top: 12px; display: block; font-weight: 400; }
  </style>
</head>
<body>
  <a-scene

    <!-- 天空盒子 -->

  <div id="alcohol-meter">
    <span class="label">✦ Essence of Reflection</span>
    <div class="bar-bg"><div class="bar-fill" id="alcohol-fill"></div></div>
    <span class="value" id="alcohol-value">0 / 14</span>
  </div>

  <div id="item-name"></div>
  <div id="info-panel"></div>
  <div id="completion">
    ✦ The Veil of Time Lifts ✦
    <span class="sub">You have gazed upon all reflections.<br>Now, the journey continues...</span>
  </div>

  <div class="controls-hint">✦ WASD · Gaze to reflect · Choose to transform</div>
  <div class="info">✦ 14 artifacts · Each holds a question</div>

  <script>
    
    // ============================================================
    // 交互数据 - 每个物品的完整叙事配置（英文）
    // ============================================================
    const ITEM_DATA = {
      silverDistiller: {
        name: 'Silver Distiller',
        mainText: '"What does it distill — the essence of life, or the residue of desire?"',
        options: [
          { label: 'A. Distill pain', feedback: 'You choose to let go of suffering. The silver gleams softly.' },
          { label: 'B. Distill time', feedback: 'Time takes shape — a fleeting echo of eternity.' }
        ]
      },
      bloodyGoblet: {
        name: 'Bloody Goblet',
        mainText: '"Does this cup hold the price of ecstasy, or a forgotten oath?"',
        options: [
          { label: 'A. Drink', feedback: 'The world blushes crimson. You taste the weight of memory.' },
          { label: 'B. Refuse', feedback: 'The cup shatters into whispers. You choose sobriety.' }
        ]
      },
      egyptClay: {
        name: 'Egyptian Clay',
        mainText: '"It remembers the sun of millennia. You remember yesterday\'s sorrow."',
        options: [
          { label: '✦ Touch', feedback: 'The clay turns to golden sand and scatters: "Release weight to touch lightness."' }
        ]
      },
      box: {
        name: 'Mysterious Box',
        mainText: '"A sealed container holding secrets from a forgotten era."',
        options: [
          { label: '✦ Open', feedback: 'The box creaks open. Inside, only echoes of what once was.' }
        ]
      },
      mirror: {
        name: 'Ancient Mirror',
        mainText: '"Do you see your true self, or the mask the world has given you?"',
        options: [
          { label: 'A. Remove the mask', feedback: 'The reflection shimmers. You glimpse the self beneath.' },
          { label: 'B. Examine deeper', feedback: 'The mask becomes transparent. You see through the illusion.' }
        ]
      },
      tornBook: {
        name: 'Torn Grimoire',
        mainText: '"Knowledge is often a cage. If this book held your death date, would you read it?"',
        options: [
          { label: '✦ Turn the page', feedback: 'The pages whisper: "To know is to be bound. To wonder is to be free."' }
        ]
      },
      alienChalice: {
        name: 'Alien Chalice',
        mainText: '"Is it sacred or absurd? Divinity often hides in the most twisted forms."',
        options: [
          { label: '✦ Gaze deeper', feedback: 'The chalice hums with cosmic resonance. You feel the infinite.' }
        ]
      },
      copperBrooch: {
        name: 'Copper Brooch',
        mainText: '"Who once wore this, and shed a final tear at parting?"',
        options: [
          { label: '✦ Remember', feedback: '"Love is not possession — it is the trace left by those who have loved."' }
        ]
      },
      grapeEarring: {
        name: 'Grape Earring',
        mainText: '"Is that the tartness of youth, or the sweetness of maturity?"',
        options: [
          { label: '✦ Listen', feedback: 'A soft laugh echoes — both, and neither. It is the memory of taste.' }
        ]
      },
      censer: {
        name: 'Bronze Censer',
        mainText: '"What do you seek? The vanishing smoke, like your fading memories?"',
        options: [
          { label: '✦ Follow the smoke', feedback: 'The smoke spirals upward, then dissolves — a reminder of impermanence.' }
        ]
      },
      copperBowl: {
        name: 'Copper Bowl',
        mainText: '"Is emptiness poverty, or completion?"',
        options: [
          { label: 'A. Fill it', feedback: 'The bowl overflows with light. You see that fullness is not always abundance.' },
          { label: 'B. Keep it empty', feedback: 'The emptiness deepens. You realize it is a vessel for possibility.' }
        ]
      },
      turquoiseLion: {
        name: 'Turquoise Lion',
        mainText: '"If you were the guardian of this wilderness, which memory would you protect?"',
        options: [
          { label: '✦ Guard a memory', feedback: 'The lion\'s eyes glow. You feel the weight of a thousand forgotten moments.' }
        ]
      },
      oneEaredAlpaca: {
        name: 'One-Eared Alpaca',
        mainText: '"Is imperfection beautiful because it honestly records suffering?"',
        options: [
          { label: '✦ Embrace', feedback: 'The alpaca glows softly — a testament to resilience and grace.' }
        ]
      },
      goldCandlestick: {
        name: 'Gold Candlestick',
        mainText: '"It illuminates the room, yet shortens its own life. Is meaning found in consumption?"',
        options: [
          { label: '✦ Accept', feedback: 'The flame burns brighter. You understand that purpose is born of sacrifice.' }
        ]
      },
      alienLiddedCup: {
        name: 'Alien Lidded Cup',
        mainText: '"What lies within? Do not open it — imagination is far more enchanting."',
        options: [
          { label: '✦ Imagine', feedback: 'The lid trembles slightly. Whatever is inside, it remains a mystery.' }
        ]
      },
      crystal: {
        name: 'Crystal Cluster',
        mainText: '"Each crystal is a frozen sigh. We are all fragments of stars, meeting on this snow."',
        options: [
          { label: '✦ Reflect', feedback: 'The crystals shift color. You see yourself in their facets — infinite and fleeting.' }
        ]
      }
    };

    const ITEM_KEYS = Object.keys(ITEM_DATA);
    let completedItems = new Set();
    let totalItems = ITEM_KEYS.length;
    let isPanelOpen = false;
    let currentItem = null;

    const panel = document.getElementById('info-panel');
    const itemNameEl = document.getElementById('item-name');
    const alcoholFill = document.getElementById('alcohol-fill');
    const alcoholValue = document.getElementById('alcohol-value');
    const completionEl = document.getElementById('completion');

    // 获取 cursor 和 raycaster 的引用，用于后续刷新
    let cursorEl = null;
    let raycasterComp = null;

    function getRaycaster() {
      if (!cursorEl) {
        cursorEl = document.querySelector('[raycaster]');
        if (cursorEl && cursorEl.components && cursorEl.components.raycaster) {
          raycasterComp = cursorEl.components.raycaster;
        }
      }
      return raycasterComp;
    }

    // 强制刷新 Raycaster（在传送后、面板关闭后调用）
    function refreshRaycaster() {
      const rc = getRaycaster();
      if (rc) {
        rc.refreshObjects();
        // 强制重新计算射线
        if (cursorEl && cursorEl.object3D) {
          cursorEl.object3D.updateMatrixWorld(true);
        }
      }
    }


    function applyEchoEffect() {
      const soundSystem = document.querySelector('#sound-system');
      const ambient = soundSystem ? soundSystem.querySelector('a-sound') : null;
      if (ambient && ambient.components && ambient.components.sound) {
        const currentVol = ambient.components.sound.volume || 0.25;
        ambient.components.sound.setVolume(Math.max(0.05, currentVol * 0.3));
        setTimeout(() => {
          ambient.components.sound.setVolume(0.25);
        }, 3000);
      }
    }

    function updateAlcoholMeter() {
      const progress = Math.min(1, completedItems.size / totalItems);
      const pct = Math.round(progress * 100);
      alcoholFill.style.width = pct + '%';
      alcoholValue.textContent = completedItems.size + ' / ' + totalItems;
      
      if (completedItems.size >= totalItems) {
        setTimeout(() => {
          completionEl.classList.add('visible');
          const soundSystem = document.querySelector('#sound-system');
          if (soundSystem) {
            const infoSound = soundSystem.querySelector('#info-sound');
            if (infoSound) infoSound.components.sound.playSound();
          }
          setTimeout(() => {
            window.location.href = 'F2.html';
          }, 4000);
        }, 600);
      }
    }

    function showInfoPanel(itemKey, itemData) {
      if (isPanelOpen) return;
      if (completedItems.has(itemKey)) return;
      
      currentItem = itemKey;
      isPanelOpen = true;
      
      itemNameEl.textContent = '✦ ' + itemData.name;
      itemNameEl.classList.add('visible');
      applyEchoEffect();
      
      const soundSystem = document.querySelector('#sound-system');
      if (soundSystem) {
        const infoSound = soundSystem.querySelector('#info-sound');
        if (infoSound) infoSound.components.sound.playSound();
      }
      
      setTimeout(() => {
        itemNameEl.classList.remove('visible');
        
        let optionsHTML = '';
        if (itemData.options && itemData.options.length > 0) {
          optionsHTML = '<div class="options">';
          itemData.options.forEach((opt, idx) => {
            optionsHTML += `<button data-optidx="${idx}" data-item="${itemKey}">${opt.label}</button>`;
          });
          optionsHTML += '</div>';
        }
        
        panel.innerHTML = `
          <span class="title">✦ ${itemData.name}</span>
          <span class="main-text">${itemData.mainText}</span>
          ${optionsHTML}
          <span class="feedback" id="feedback-text"></span>
        `;
        panel.classList.add('visible');
        
        panel.querySelectorAll('.options button').forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const idx = parseInt(this.dataset.optidx);
            const key = this.dataset.item;
            const data = ITEM_DATA[key];
            if (data && data.options && data.options[idx]) {
              const feedback = data.options[idx].feedback;
              const fbEl = document.getElementById('feedback-text');
              if (fbEl) {
                fbEl.textContent = '✦ ' + feedback;
              }
              panel.querySelectorAll('.options button').forEach(b => b.disabled = true);
              if (!completedItems.has(key)) {
                completedItems.add(key);
                updateAlcoholMeter();
              }
              const soundSystem = document.querySelector('#sound-system');
              if (soundSystem) {
                const clickSound = soundSystem.querySelector('#click-sound');
                if (clickSound) clickSound.components.sound.playSound();
              }
              setTimeout(() => {
                closePanel();
              }, 3000);
            }
          });
        });
        
        // 点击面板外关闭
        const closeHandler = function(e) {
          if (!panel.contains(e.target) && !e.target.closest('.options')) {
            closePanel();
            document.removeEventListener('click', closeHandler);
          }
        };
        document.addEventListener('click', closeHandler);
        
      }, 2000);
    }

    function closePanel() {
      panel.classList.remove('visible');
      panel.innerHTML = '';
      isPanelOpen = false;
      currentItem = null;
      itemNameEl.classList.remove('visible');
      // 关闭面板后刷新 raycaster，恢复检测
      setTimeout(refreshRaycaster, 100);
    }

    // ============================================================
    // A-Frame 凝视组件 - 增加防抖和状态保护
    // ============================================================
    AFRAME.registerComponent('gaze-info', {
      schema: {
        itemKey: { type: 'string', default: '' }
      },
      init: function() {
        let el = this.el;
        let key = this.data.itemKey || el.dataset.item;
        if (!key || !ITEM_DATA[key]) return;
        
        let hoverTimer = null;
        let isHovering = false;
        let isActivated = false; // 防止重复触发
        
        el.addEventListener('mouseenter', function() {
  if (isPanelOpen || isActivated) return; // 删除了 completedItems.has(key) 的限制
  isHovering = true;
  
  // 即使已完成，也显示物品名字
  itemNameEl.textContent = ITEM_DATA[key].name;
  if (completedItems.has(key)) {
      itemNameEl.textContent += " (已探索)";
  }
  itemNameEl.classList.add('visible');

  hoverTimer = setTimeout(() => {
    // 只有在未完成时，才触发弹窗
    if (isHovering && !isPanelOpen && !completedItems.has(key)) {
      isActivated = true;
      showInfoPanel(key);
    }
  }, 1200); // 如果觉得 1.2秒太长容易滑钩，可以改成 800
});
        
        el.addEventListener('mouseleave', function() {
          isHovering = false;
          if (hoverTimer) {
            clearTimeout(hoverTimer);
            hoverTimer = null;
          }
          // 只有面板未打开时才隐藏物品名
          if (!isPanelOpen) {
            itemNameEl.textContent = '';
            itemNameEl.classList.remove('visible');
          }
        });
      }
    });

    // 注册所有物品
    document.querySelectorAll('.item[data-item]').forEach(el => {
      const key = el.dataset.item;
      if (key && ITEM_DATA[key]) {
        el.setAttribute('gaze-info', `itemKey: ${key}`);
      }
    });

    // ============================================================
    // A-Frame 平滑传送组件 - 增加刷新
    // ============================================================
    AFRAME.registerComponent('smooth-teleport', {
      schema: {
        target: { type: 'vec3' },
        dur: { type: 'number', default: 800 }
      },

      init: function () {
        const el = this.el;
        const rig = document.querySelector('#rig');
        const data = this.data;

        let timer = null;
        let isTeleporting = false;

        el.addEventListener('mouseenter', () => {
          if (isTeleporting) return;
          timer = setTimeout(() => {
            isTeleporting = true;
            rig.setAttribute('animation', {
              property: 'position',
              to: `${data.target.x} ${data.target.y} ${data.target.z}`,
              dur: data.dur,
              easing: 'easeInOutQuad'
            });
            
            // 播放传送音效
            const soundSystem = document.querySelector('#sound-system');
            if (soundSystem) {
              const teleSound = soundSystem.querySelector('#teleport-sound');
              if (teleSound) teleSound.components.sound.playSound();
            }
            
            setTimeout(() => {
              // 传送完成后刷新 raycaster
              refreshRaycaster();
              // 清理物品名显示
              itemNameEl.classList.remove('visible');
              itemNameEl.textContent = '';
              isTeleporting = false;
            }, data.dur + 100);
            
            timer = null;
          }, 1000);
        });

        el.addEventListener('mouseleave', () => {
          if (timer) {
            clearTimeout(timer);
            timer = null;
          }
        });
      }
    });

    // ============================================================
    // 初始化
    // ============================================================
    updateAlcoholMeter();

    document.addEventListener('DOMContentLoaded', function() {
      
      const scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('loaded', function() {
          console.log('✦ 完整场景已加载 — ' + totalItems + ' 件物品等待探索');
          // 场景加载完成后初始化 raycaster
          setTimeout(refreshRaycaster, 500);
        });
      }
    });

    // 每次点击后刷新 raycaster
    document.addEventListener('click', function(e) {
      const soundSystem = document.querySelector('#sound-system');
      if (soundSystem && e.target.closest('.item')) {
        const clickSound = soundSystem.querySelector('#click-sound');
        if (clickSound) clickSound.components.sound.playSound();
      }
      // 点击任何地方都刷新 raycaster（但不包括面板按钮）
      if (!e.target.closest('.options') && !e.target.closest('#info-panel')) {
        setTimeout(refreshRaycaster, 50);
      }
    });

    // 窗口变化时刷新
    window.addEventListener('resize', function() {
      setTimeout(refreshRaycaster, 200);
    });

    console.log('✦ 完整场景已启动 — ' + totalItems + ' 件物品等待探索');

    document.getElementById('skip-btn').addEventListener('click', function() {
  window.location.href = 'F2.html';
});
  </script>
</body>
</html>
