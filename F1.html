<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hathor</title>

  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>

  <style>
    /* 基础重置：黑底，无滚动 */
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }

    /* VR 分屏模式下保留黑边逻辑 */
    body.is-vr .a-canvas {
      max-width: 200mm !important;
      margin: 0 auto !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      right: auto !important;
    }

    /* 简单的标题水印 */
    .watermark {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.2);
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #000;
    }
  </style>
</head>
<body>

  <div class="watermark">Hathor</div>

  <a-scene
    background="color: #000000"
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    device-orientation-permission-ui="enabled: true"
  >

    <a-assets>
      <img id="panoramaImg" src="F1/f1.png" crossorigin="anonymous">
    </a-assets>

    <a-sky src="#panoramaImg" rotation="0 -90 0"></a-sky>

    <a-entity id="rig" position="0 0.3 0">
      <a-camera look-controls wasd-controls-enabled="false">
        <a-cursor
          fuse="false"
          geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.025"
          material="color: #00ccff; shader: flat; opacity: 0.4"
        ></a-cursor>
      </a-camera>
    </a-entity>

    <a-ambient-light intensity="0.6" color="#ffffff"></a-ambient-light>

  </a-scene>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var sceneEl = document.querySelector('a-scene');
      if (sceneEl) {
        sceneEl.addEventListener('enter-vr', function () {
          document.body.classList.add('is-vr');
        });
        sceneEl.addEventListener('exit-vr', function () {
          document.body.classList.remove('is-vr');
        });
      }
    });
  </script>

</body>
</html>
