<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>AR ALCOHOL F1 · 高斯粒子控制台</title>
    <style>
        /* 导入指定英文字体 */
        @font-face {
            font-family: 'AkzidenzGrotesk-Extended';
            src: url('AkzidenzGrotesk-Extended.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'AkzidenzGrotesk-LightExtended';
            src: url('AkzidenzGrotesk-LightExtended.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'AkzidenzGrotesk-LightExtended', 'Helvetica Neue', Arial, sans-serif;
        }
        canvas {
            display: block;
        }

        /* UI 控制面板 — 右下角悬浮，半透明磨砂玻璃 */
        .control-panel {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 100;
            min-width: 220px;
            font-family: 'AkzidenzGrotesk-Extended', monospace;
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
        }

        /* 滑块容器 */
        .slider-container {
            margin-bottom: 16px;
        }
        .slider-container label {
            display: block;
            color: #fff;
            font-size: 12px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-family: 'AkzidenzGrotesk-Extended', monospace;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: #2a2a3a;
            height: 3px;
            border-radius: 3px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00d2ff;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 6px #00d2ff;
        }
        .value-display {
            text-align: right;
            font-size: 11px;
            color: #ccc;
            margin-top: 4px;
            font-family: monospace;
        }

        /* 按钮样式 */
        .action-btn {
            background: rgba(0, 210, 255, 0.2);
            border: 1px solid rgba(0, 210, 255, 0.5);
            color: #00d2ff;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-family: 'AkzidenzGrotesk-Extended', monospace;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 8px;
            backdrop-filter: blur(4px);
        }
        .action-btn:hover {
            background: #00aaff;
            color: #000;
            border-color: #00aaff;
            box-shadow: 0 0 10px rgba(0,170,255,0.5);
        }

        /* 状态指示小圆点 */
        .status-led {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ffaa33;
            margin-right: 6px;
            box-shadow: 0 0 4px #ffaa33;
            transition: background-color 0.2s;
        }
        .status-led.active {
            background-color: #00ffaa;
            box-shadow: 0 0 6px #00ffaa;
        }
        .btn-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 快捷键提示小字 */
        .shortcut-hint {
            font-size: 9px;
            color: #aaa;
            text-align: center;
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 8px;
            font-family: monospace;
        }

        @media (max-width: 600px) {
            .control-panel { padding: 12px 16px; min-width: 170px; bottom: 16px; right: 16px; }
            .action-btn { font-size: 10px; padding: 5px 10px; }
            .slider-container label { font-size: 10px; }
        }
    </style>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d/build/gaussian-splats-3d.module.js"
        }
      }
    </script>
</head>
<body>
    <div class="control-panel" id="controlPanel">
        <div class="slider-container">
            <label>🔘 CAMERA DISTANCE</label>
            <input type="range" id="distanceSlider" min="1.5" max="12" step="0.01" value="5.0">
            <div class="value-display" id="distanceValue">距离: 5.00</div>
        </div>
        <button id="autoRotateBtn" class="action-btn">
            <span class="btn-text"><span class="status-led" id="autoLed"></span> 🧊 AUTO-ROTATE OFF</span>
        </button>
        <div class="shortcut-hint">💡 快捷键 <span style="color:#00d2ff;">P</span> 切换自动旋转 | 滑块控制相机距离</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

        // 1. 初始化高斯粒子查看器
        const viewer = new GaussianSplats3D.Viewer({
            'cameraUp': [0, 1, 0],
            'initialCameraPosition': [0, 2, 5],
            'initialCameraLookAt': [0, 0, 0],
            'sharedMemoryForWorkers': false
        });

        // 用于存储相机的原始方向参考 (极坐标角度)
        let currentAzimuth = 0;        // 水平弧度
        let currentPolar = Math.PI / 3; // 俯仰弧度 (固定为当前值)
        let isAutoRotating = false;
        let autoRotateSpeed = 0.005;
        let animationId = null;
        let cameraDistance = 5.0;       // 与初始距离一致
        
        // 获取相机引用 (等待加载完成后稳定)
        let mainCamera = null;
        let targetPoint = new THREE.Vector3(0, 0, 0);
        
        // 辅助: 从相机位置反算角度 (以 targetPoint 为原点)
        function updateAnglesFromCamera() {
            if (!mainCamera) return;
            const offset = new THREE.Vector3().subVectors(mainCamera.position, targetPoint);
            const radius = offset.length();
            cameraDistance = radius;
            // 计算水平角 azimuth (atan2)
            currentAzimuth = Math.atan2(offset.x, offset.z);
            // 计算俯仰角 polar (Y轴夹角)
            currentPolar = Math.acos(Math.min(1, Math.max(-1, offset.y / radius)));
        }
        
        // 根据距离和角度重新设置相机位置
        // 根据距离和角度重新设置相机位置
function updateCameraFromAngles() {
    if (!mainCamera) return;
    
    // 计算新的相机位置
    const x = cameraDistance * Math.sin(currentPolar) * Math.sin(currentAzimuth);
    const z = cameraDistance * Math.sin(currentPolar) * Math.cos(currentAzimuth);
    const y = cameraDistance * Math.cos(currentPolar);
    
    // 设置相机位置
    mainCamera.position.set(x, y, z);
    
    // 【核心修复】：除了设置相机的 lookAt，必须同步更新 viewer.controls 的 target
    mainCamera.lookAt(targetPoint);

    if (viewer && viewer.controls) {
        // 让底层控制器也“注视”同一个目标点
        viewer.controls.target.copy(targetPoint);
        // 强制更新控制器内部状态，防止被覆盖
        if (typeof viewer.controls.update === 'function') {
            viewer.controls.update();
        }
    }
}
        
        // 设置相机距离 (外部滑块调用)
        function setCameraDistance(dist) {
            if (!mainCamera) return;
            cameraDistance = Math.min(12, Math.max(1.5, dist));
            updateCameraFromAngles();
            document.getElementById('distanceValue').innerText = `距离: ${cameraDistance.toFixed(2)}`;
        }
        
        // 加载粒子场景
        viewer.addSplatScene('./F2.ply', {
            'showLoadingUI': true,
            'position': [0, 0, 0],
            'rotation': [0, 0, 0, 1],
            'scale': [1, 1, 1]
        })
       .then(() => {
            viewer.start();
            console.log("F2.ply 场景完美加载！");

            // ✨ 【核心修复】：动态获取底层的 Three.js Scene 对象
            let targetScene = viewer.scene;
            if (!targetScene && viewer.splatMesh) {
                targetScene = viewer.splatMesh.parent; // 顺藤摸瓜获取真实的场景容器
            }

            // 如果还是找不到场景，输出错误提示防止崩溃
            if (!targetScene) {
                console.error("❌ 未能获取到 Three.js Scene 对象，请检查 viewer 属性！");
                return;
            }

            // 1. 使用获取到的 targetScene 添加环境光和主光源
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
            targetScene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); 
            dirLight.position.set(3, 6, 4);
            targetScene.add(dirLight);

            // 2. 载入气泡酒杯.glb 放入场景
            const gltfLoader = new GLTFLoader();
            gltfLoader.load('./气泡酒杯.glb', (gltf) => {
                const model = gltf.scene;
                
                // 如果放进去后还是看不到，可以把 0, 0, 0 改为 0, 1.0, 0 往上提一提
                model.position.set(0, 0, 0); 
                
                // 这里可以控制大小 (1.0 为原始大小，若太小可改为 2.0 或 5.0 放大)
                model.scale.set(1.0, 1.0, 1.0); 
                
                targetScene.add(model);
                console.log("👉 气泡酒杯.glb 已成功放置在场景中！");
            }, undefined, (error) => {
                console.error("加载 GLB 模型失败，请检查文件名或路径:", error);
            });
            
            // 后续的相机获取和初始化代码保持不变...
            mainCamera = viewer.camera;
            if (mainCamera) {
                targetPoint.set(0, 0, 0);
                updateAnglesFromCamera();
                document.getElementById('distanceSlider').value = cameraDistance;
                document.getElementById('distanceValue').innerText = `距离: ${cameraDistance.toFixed(2)}`;
            } else {
                console.warn("未能获取到相机对象，将使用轮询");
                const interval = setInterval(() => {
                    if (viewer.camera) {
                        mainCamera = viewer.camera;
                        targetPoint.set(0, 0, 0);
                        updateAnglesFromCamera();
                        document.getElementById('distanceSlider').value = cameraDistance;
                        document.getElementById('distanceValue').innerText = `距离: ${cameraDistance.toFixed(2)}`;
                        clearInterval(interval);
                    }
                }, 100);
            }
        })
        .catch((error) => {
            console.error("加载出错了，检查一下文件名对不对:", error);
            const panel = document.getElementById('controlPanel');
            if (panel) panel.style.opacity = '0.5';
        });
        
        // --- UI 事件绑定 ---
        const distanceSlider = document.getElementById('distanceSlider');
        const autoRotateBtn = document.getElementById('autoRotateBtn');
        const autoLed = document.getElementById('autoLed');
        
        distanceSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            setCameraDistance(val);
        });
        
        // 切换自动旋转
        function toggleAutoRotate() {
            isAutoRotating = !isAutoRotating;
            if (isAutoRotating) {
                autoLed.classList.add('active');
                autoRotateBtn.innerHTML = '<span class="btn-text"><span class="status-led active"></span> 🔄 AUTO-ROTATE ON</span>';
                startAutoRotateLoop();
            } else {
                autoLed.classList.remove('active');
                autoRotateBtn.innerHTML = '<span class="btn-text"><span class="status-led"></span> 🧊 AUTO-ROTATE OFF</span>';
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }
        }
        
        function startAutoRotateLoop() {
            if (animationId) cancelAnimationFrame(animationId);
            function rotateStep() {
                if (!isAutoRotating) return;
                if (mainCamera) {
                    // 累加水平角，保持俯仰不变
                    currentAzimuth += autoRotateSpeed;
                    updateCameraFromAngles();
                }
                animationId = requestAnimationFrame(rotateStep);
            }
            rotateStep();
        }
        
        autoRotateBtn.addEventListener('click', toggleAutoRotate);
        
        // 监听键盘 P 键
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyP') {
                e.preventDefault();
                toggleAutoRotate();
            }
        });
        
        // 辅助: 当用户用鼠标拖拽时更新我们的角度记录
        function syncAnglesFromCamera() {
            if (!mainCamera || isAutoRotating) return; 
            const offset = new THREE.Vector3().subVectors(mainCamera.position, targetPoint);
            const newDist = offset.length();
            if (Math.abs(newDist - cameraDistance) > 0.01) {
                cameraDistance = newDist;
                distanceSlider.value = cameraDistance;
                document.getElementById('distanceValue').innerText = `距离: ${cameraDistance.toFixed(2)}`;
            }
            currentAzimuth = Math.atan2(offset.x, offset.z);
            currentPolar = Math.acos(Math.min(1, Math.max(-1, offset.y / newDist)));
        }
        
        // 周期性同步
        function syncLoop() {
            requestAnimationFrame(syncLoop);
            if (mainCamera && !isAutoRotating) {
                syncAnglesFromCamera();
            }
        }
        syncLoop();
        
        // 处理窗口大小变化
        window.addEventListener('resize', () => {
            if (viewer && viewer.camera) {
                viewer.camera.aspect = window.innerWidth / window.innerHeight;
                viewer.camera.updateProjectionMatrix();
            }
        });
        
        console.log("UI控制面板已加载 | 滑块控制距离 | P键 / 按钮切换自动旋转");
    </script>
</body>
</html>
