<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFE</title>
  <style>
    /* 基础重置 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* 摄像头画面铺满全屏 */
    #camera-feed {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 保证画面不变形铺满 */
      z-index: 1;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }

    /* 粒子画布 */
    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none; /* 让鼠标可以穿透粒子层 */
    }

    /* 启动按钮和遮罩层 */
    #start-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      transition: opacity 1s ease-in-out;
    }

    .start-btn {
      padding: 15px 40px;
      font-size: 20px;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.3s ease;
      letter-spacing: 2px;
    }

    .start-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div id="start-overlay">
    <h1 style="font-weight: 300; margin-bottom: 40px; text-shadow: 0 0 10px rgba(255,255,255,0.5);">Really going to leave?</h1>
    <button class="start-btn" id="start-btn">Leave</button>
  </div>

  <video id="camera-feed" autoplay playsinline></video>

  <canvas id="particle-canvas"></canvas>

  <audio id="bg-music" loop>
    <source src="https://downsc.chinaz.net/Files/DownLoad/sound1/201906/11582.mp3" type="audio/mpeg">
  </audio>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('start-overlay');
    const video = document.getElementById('camera-feed');
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    const bgMusic = document.getElementById('bg-music');

    // 调整画布尺寸
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ==========================================
    // 粒子系统配置 (梦幻光斑/樱花散落效果)
    // ==========================================
    const particlesArray = [];
    const numberOfParticles = 100;

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        // 粒子移动速度
        this.vx = (Math.random() - 0.5) * 1.5; 
        this.vy = Math.random() * -2 - 0.5; // 向上飘动
        // 粒子大小和透明度
        this.size = Math.random() * 4 + 1;
        this.alpha = Math.random() * 0.6 + 0.2;
        // 随机生成偏暖色的浪漫颜色 (粉红、浅金、纯白)
        const colors = ['255, 182, 193', '255, 223, 186', '255, 255, 255'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        // 边界处理：飘出屏幕上方后从下方重新出现
        if (this.y + this.size < 0) {
          this.y = canvas.height + this.size;
          this.x = Math.random() * canvas.width;
        }
        if (this.x > canvas.width) this.x = 0;
        if (this.x < 0) this.x = canvas.width;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.color}, ${this.alpha})`;
        ctx.shadowBlur = 10;
        ctx.shadowColor = `rgba(${this.color}, 0.8)`; // 发光效果
        ctx.fill();
      }
    }

    function initParticles() {
      for (let i = 0; i < numberOfParticles; i++) {
        particlesArray.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
      }
      requestAnimationFrame(animateParticles);
    }

    // ==========================================
    // 启动核心逻辑
    // ==========================================
    startBtn.addEventListener('click', async () => {
      // 1. 尝试获取摄像头权限
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user" }, // 优先使用前置摄像头
          audio: false 
        });
        
        video.srcObject = stream;
        
        // 2. 播放音乐
        bgMusic.volume = 0.5; // 初始音量设置
        bgMusic.play();

        // 3. 隐藏引导层，显示画面
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.style.display = 'none';
          video.style.opacity = '1';
        }, 1000);

        // 4. 启动粒子动画
        initParticles();
        animateParticles();

      } catch (err) {
        console.error("无法访问摄像头: ", err);
        alert("需要摄像头权限才能体验这个网页哦！或者当前环境不支持（请确保使用 https 或 localhost）");
      }
    });
  </script>
</body>
</html>
